<svg width="1000" height="640" viewBox="0 0 1000 640" xmlns="http://www.w3.org/2000/svg" role="img">
<title>TradePilot architecture: buyer emails, cron, and the dashboard all flow through one Function Compute agent core backed by Qwen and Tablestore.</title>
<desc>External actors (buyer email, cron scheduler, human operator via dashboard) feed into Function Compute, which runs three sub-flow modules (pipeline, repricing, reorder) calling Qwen for language understanding and Tablestore for persistent state.</desc>

<rect width="1000" height="640" fill="#0c1424"/>

<!-- title -->
<text x="40" y="44" font-family="ui-sans-serif,system-ui" font-size="20" font-weight="700" fill="#f2ede0">TradePilot — architecture</text>
<text x="40" y="66" font-family="ui-monospace,monospace" font-size="12" fill="#7b86a3">Qwen Cloud Hackathon · Track 4 · Alibaba Cloud (ap-southeast-1)</text>

<!-- ===== external actors (left column) ===== -->
<rect x="40" y="110" width="200" height="70" rx="6" fill="#131e33" stroke="#2a3b5c"/>
<text x="140" y="138" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="14" font-weight="600" fill="#f2ede0">Buyer email</text>
<text x="140" y="158" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#9fb0cc">7 languages, any SKU</text>

<rect x="40" y="285" width="200" height="70" rx="6" fill="#131e33" stroke="#2a3b5c"/>
<text x="140" y="313" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="14" font-weight="600" fill="#f2ede0">Cron (VPS)</text>
<text x="140" y="333" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#9fb0cc">every 10 minutes</text>

<rect x="40" y="460" width="200" height="70" rx="6" fill="#131e33" stroke="#2a3b5c"/>
<text x="140" y="488" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="14" font-weight="600" fill="#f2ede0">Human operator</text>
<text x="140" y="508" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#9fb0cc">approve / reject</text>

<!-- ===== Alibaba Cloud container ===== -->
<rect x="320" y="90" width="420" height="470" rx="14" fill="#0c1424" stroke="#c68a3e" stroke-width="1.5" stroke-dasharray="4 3"/>
<text x="345" y="118" font-family="ui-sans-serif,system-ui" font-size="13" font-weight="700" fill="#c68a3e">Alibaba Cloud</text>

<!-- Function Compute box -->
<rect x="345" y="140" width="370" height="200" rx="8" fill="#131e33" stroke="#2a3b5c"/>
<text x="530" y="164" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="14" font-weight="600" fill="#f2ede0">Function Compute</text>
<text x="530" y="181" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7b86a3">FastAPI · custom runtime · scales to zero</text>

<rect x="365" y="196" width="330" height="34" rx="4" fill="#0c1424" stroke="#2a3b5c"/>
<text x="530" y="217" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#9fb0cc">pipeline.py — quote + negotiate (hero flow)</text>

<rect x="365" y="238" width="330" height="34" rx="4" fill="#0c1424" stroke="#2a3b5c"/>
<text x="530" y="259" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#9fb0cc">repricing.py — ±10% market band</text>

<rect x="365" y="280" width="330" height="34" rx="4" fill="#0c1424" stroke="#2a3b5c"/>
<text x="530" y="301" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#9fb0cc">reorder.py — stock threshold + memo</text>

<!-- Qwen box -->
<rect x="345" y="370" width="170" height="70" rx="8" fill="#1c2c47" stroke="#c68a3e"/>
<text x="430" y="398" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="14" font-weight="600" fill="#e0a94f">Qwen</text>
<text x="430" y="418" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#c68a3e">flash (extract) + plus (draft)</text>

<!-- Tablestore box -->
<rect x="545" y="370" width="170" height="70" rx="8" fill="#1c2c47" stroke="#c68a3e"/>
<text x="630" y="393" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="14" font-weight="600" fill="#e0a94f">Tablestore</text>
<text x="630" y="410" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#c68a3e">catalog · buyer_memory ·</text>
<text x="630" y="424" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#c68a3e">approvals · processed_emails</text>

<!-- ===== dashboard (right, own VPS) ===== -->
<rect x="800" y="140" width="160" height="200" rx="8" fill="#131e33" stroke="#2a3b5c"/>
<text x="880" y="164" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="13" font-weight="600" fill="#f2ede0">Dashboard</text>
<text x="880" y="182" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7b86a3">Next.js · own VPS</text>
<text x="880" y="220" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#9fb0cc">Nginx</text>
<text x="880" y="238" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#9fb0cc">Let's Encrypt TLS</text>
<text x="880" y="270" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#9fb0cc">tradepilot.</text>
<text x="880" y="286" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#9fb0cc">blackjaguar.dev</text>

<!-- ===== arrows ===== -->
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#7b86a3" stroke-width="1.5"/>
  </marker>
  <marker id="arrowBrass" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#c68a3e" stroke-width="1.5"/>
  </marker>
</defs>

<!-- buyer email -> webhook -> FC -->
<line x1="240" y1="145" x2="343" y2="200" stroke="#7b86a3" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="260" y="180" font-family="ui-monospace,monospace" font-size="10.5" fill="#7b86a3">/webhook/email</text>

<!-- cron -> FC scans -->
<line x1="240" y1="315" x2="343" y2="280" stroke="#7b86a3" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="248" y="300" font-family="ui-monospace,monospace" font-size="10.5" fill="#7b86a3">/agent/scan/*</text>

<!-- FC -> Qwen -->
<line x1="450" y1="340" x2="440" y2="368" stroke="#c68a3e" stroke-width="1.2" marker-end="url(#arrowBrass)"/>
<!-- FC -> Tablestore -->
<line x1="610" y1="340" x2="620" y2="368" stroke="#c68a3e" stroke-width="1.2" marker-end="url(#arrowBrass)"/>

<!-- FC <-> dashboard proxy -->
<line x1="715" y1="220" x2="798" y2="220" stroke="#7b86a3" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="722" y="212" font-family="ui-monospace,monospace" font-size="10" fill="#7b86a3">HTTPS (server-side)</text>

<!-- human <-> dashboard -->
<path d="M240 495 C 500 560, 700 500, 878 342" fill="none" stroke="#7b86a3" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="420" y="565" font-family="ui-monospace,monospace" font-size="10.5" fill="#7b86a3">approve / reject via UI</text>

<!-- legend -->
<rect x="345" y="580" width="14" height="3" fill="#7b86a3"/>
<text x="365" y="586" font-family="ui-monospace,monospace" font-size="11" fill="#9fb0cc">data / HTTP flow</text>
<rect x="500" y="580" width="14" height="3" fill="#c68a3e"/>
<text x="520" y="586" font-family="ui-monospace,monospace" font-size="11" fill="#9fb0cc">Alibaba Cloud service calls</text>
</svg>
