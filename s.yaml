# Serverless Devs v3 — despliegue de TradePilot en Function Compute 3.0
# Deploy:  s deploy
# Invocar: s info   (te da la URL pública del trigger HTTP)
#
# Claves de COSTO (no las toques a la ligera):
#   - Sin "provisionedConcurrency": las instancias escalan a 0 cuando no hay
#     tráfico => NO pagas por estar corriendo. Este es el ahorro grande.
#   - memorySize 512 y timeout 60: suficiente, no inflar.
edition: 3.0.0
name: tradepilot
access: default

vars:
  region: ${env.ALIYUN_REGION}

resources:
  tradepilot-api:
    component: fc3
    props:
      region: ${vars.region}
      functionName: tradepilot-api
      description: TradePilot cross-border ops agent (Track 4)
      runtime: custom.debian10
      code: ./
      handler: index.handler          # ignorado por custom runtime, requerido por el schema
      timeout: 60
      memorySize: 512
      instanceConcurrency: 5
      customRuntimeConfig:
        command:
          - bash
          - bootstrap
        port: 9000
      environmentVariables:
        DASHSCOPE_API_KEY: ${env.DASHSCOPE_API_KEY}
        QWEN_BASE_URL: ${env.QWEN_BASE_URL}
        QWEN_MODEL_FAST: ${env.QWEN_MODEL_FAST}
        QWEN_MODEL_SMART: ${env.QWEN_MODEL_SMART}
        TABLESTORE_ENDPOINT: ${env.TABLESTORE_ENDPOINT}
        TABLESTORE_INSTANCE: ${env.TABLESTORE_INSTANCE}
        TABLESTORE_ACCESS_KEY_ID: ${env.TABLESTORE_ACCESS_KEY_ID}
        TABLESTORE_ACCESS_KEY_SECRET: ${env.TABLESTORE_ACCESS_KEY_SECRET}
        ALIYUN_REGION: ${env.ALIYUN_REGION}
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
      # NOTA sobre repricing/reorder (Fase 3, subflujos 2 y 3):
      # Los endpoints POST /agent/scan/repricing y POST /agent/scan/reorder ya
      # existen y funcionan vía HTTP. Para dispararlos automáticamente cada
      # ciertas horas, la opción más simple y confiable a esta altura del
      # hackathon es un cron EXTERNO (ej. crontab en tu VPS) pegándole a la
      # URL pública de FC:
      #
      #   0 */6 * * *  curl -X POST https://<tu-url-fc>/agent/scan/repricing
      #   0 3 * * *    curl -X POST https://<tu-url-fc>/agent/scan/reorder
      #
      # Alibaba FC también soporta triggerType: timer nativo, pero el contrato
      # exacto de cómo entrega el evento a un custom runtime no está verificado
      # aquí — mejor no apostarle a algo sin probar a horas del deadline.
